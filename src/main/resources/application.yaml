spring:
  application:
    name: shopflow

  datasource:
    url: jdbc:postgresql://localhost:5433/shopflow
    username: shopflow_user
    password: shopflow123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    time-zone: America/Sao_Paulo

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics